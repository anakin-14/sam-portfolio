<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Archive</title>
    <meta name="description" content="A curated collection of design work. An archive of craft, vision, and execution.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a0a' width='100' height='100'/><rect fill='%23f5f5f5' x='20' y='20' width='60' height='60'/></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- WebGL Cursor Canvas -->
    <canvas id="cursor-canvas"></canvas>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="#" class="nav-logo">Archive</a>
            <div class="nav-right">
                <span class="nav-count" id="work-count">4 Works</span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-shapes">
            <div class="hero-shape"></div>
            <div class="hero-shape"></div>
            <div class="hero-shape"></div>
            <div class="hero-shape"></div>
        </div>
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="hero-line">Design</span>
                <span class="hero-line hero-line-italic">Archive<span class="underline"></span></span>
            </h1>
            <p class="hero-subtitle">A curated collection of work.<br>Craft, vision, and execution.</p>
        </div>
        <div class="hero-scroll">
            <span>Scroll to explore</span>
            <svg width="16" height="24" viewBox="0 0 16 24" fill="none">
                <path d="M8 0V22M8 22L1 15M8 22L15 15" stroke="currentColor" stroke-width="1.5"/>
            </svg>
        </div>
    </header>

    <!-- Filter & Search Bar -->
    <section class="filter-bar">
        <div class="filter-bar-inner">
            <div class="filter-buttons" id="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
            </div>
            <div class="search-wrapper">
                <input type="text" class="search-input" id="search-input" placeholder="Search works...">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M21 21L16 16" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </div>
        </div>
    </section>

    <!-- Gallery -->
    <main class="gallery" id="gallery">
        <!-- Gallery items are generated by JavaScript -->
    </main>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display: none;">
        <p>No works found matching your search.</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <p class="footer-text">Design Archive</p>
            <p class="footer-year">2026</p>
        </div>
    </footer>

    <!-- Fullscreen Overlay -->
    <div class="overlay" id="overlay">
        <button class="overlay-close" id="overlay-close" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="1.5"/>
            </svg>
        </button>
        <button class="overlay-nav overlay-prev" id="overlay-prev" aria-label="Previous">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="1.5"/>
            </svg>
        </button>
        <button class="overlay-nav overlay-next" id="overlay-next" aria-label="Next">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="1.5"/>
            </svg>
        </button>
        <div class="overlay-content">
            <div class="overlay-image-wrapper">
                <img class="overlay-image" id="overlay-image" src="" alt="">
            </div>
            <div class="overlay-info">
                <span class="overlay-category" id="overlay-category"></span>
                <h2 class="overlay-title" id="overlay-title"></h2>
                <p class="overlay-year" id="overlay-year"></p>
                <p class="overlay-description" id="overlay-description"></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="js/designs.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
